services:
  # Container 1: Mesin PHP Utama
  app:
    build: .
    container_name: promosi-najm-app
    restart: always
    volumes:
      - ./:/var/www/html
    command: sh -c "mkdir -p temp_uploads queue_uploads && chmod 777 temp_uploads queue_uploads && chmod 666 .env && php-fpm"

  # Container 2: Mesin Scheduler Otomatis (Baru)
  scheduler:
    build: .
    container_name: promosi-najm-scheduler
    restart: always
    volumes:
      - ./:/var/www/html
    # Menjalankan loop bot otomatis di background
    command: sh -c "mkdir -p queue_uploads && chmod 777 queue_uploads && /opt/venv/bin/python scheduler.py"
    depends_on:
      - app

  # Container 3: Nginx Web Server
  web:
    image: nginx:alpine
    container_name: promosi-najm-web
    restart: always
    ports:
      - "84:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
